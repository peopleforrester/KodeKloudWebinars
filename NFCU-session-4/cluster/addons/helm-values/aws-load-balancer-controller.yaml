# ABOUTME: AWS Load Balancer Controller values (EKS only) — fronts Kourier with an NLB.
# ABOUTME: Auth via EKS Pod Identity (association in Terraform); no static credentials.
#
# chart:      aws-load-balancer-controller
# chartVersion: 3.3.0
# appVersion: v3.3.0
# repo:       https://aws.github.io/eks-charts
# why this version: current stable; supports Kubernetes 1.34-1.36.
#
# NOT installed on local kind — there is no AWS load balancer there. bootstrap.sh skips
# this component unless invoked as `bootstrap.sh eks`.
#
# bootstrap.sh injects only clusterName via --set. Credentials come from the Pod Identity
# association (kube-system:aws-load-balancer-controller) created in cluster/eks/terraform —
# no role-arn annotation needed (that was the IRSA pattern).

# clusterName is injected by bootstrap.sh: --set clusterName=<cluster>
serviceAccount:
  create: true
  name: aws-load-balancer-controller
  # No eks.amazonaws.com/role-arn annotation — the Pod Identity association handles binding.

replicaCount: 1

resources:
  requests:
    cpu: 50m
    memory: 96Mi
  limits:
    memory: 192Mi
