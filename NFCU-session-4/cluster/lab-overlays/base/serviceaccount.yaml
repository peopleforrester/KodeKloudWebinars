# The ServiceAccount the KServe storage initializer runs as. On EKS, the lab platform
# patches the role-arn annotation with the IRSA role from `terraform output
# kserve_s3_role_arn` so model artifacts load from the private S3 bucket without keys.
# On local kind there is no IRSA; the annotation is harmless and ignored.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kserve-sa
  annotations:
    # PLACEHOLDER — replace <ACCOUNT_ID> and <ROLE_NAME> per environment, or let the lab
    # platform inject it. Matches var.kserve_service_account_name in cluster/eks/terraform.
    eks.amazonaws.com/role-arn: "arn:aws:iam::<ACCOUNT_ID>:role/<ROLE_NAME>"
