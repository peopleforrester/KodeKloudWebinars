# The ServiceAccount the KServe storage initializer runs as. On EKS, the lab platform binds
# it to the S3-reader role with an EKS Pod Identity association (one per attendee namespace):
#
#   aws eks create-pod-identity-association --cluster-name <cluster> \
#     --namespace <attendee-ns> --service-account kserve-sa \
#     --role-arn $(terraform -chdir=cluster/eks/terraform output -raw kserve_s3_role_arn)
#
# Pod Identity needs NO annotation on the ServiceAccount (unlike IRSA) — the association
# does the binding. On local kind there is no Pod Identity; this is just a plain SA.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kserve-sa
