# Denies traffic from OTHER attendee namespaces while still allowing the Knative/KServe
# control path. A naive "deny all cross-namespace" would break the lab: Kourier and the
# Knative activator live in their own namespaces and must reach the predictor pods. So we
# allow same-namespace traffic plus the specific system namespaces, and nothing else —
# attendee A still cannot reach attendee B.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-cross-namespace
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # Same-namespace traffic (this attendee's own pods).
    - from:
        - podSelector: {}
    # System namespaces that must reach the predictors: Knative ingress/activator,
    # Kourier, kube-system (CoreDNS, metrics), and Prometheus scraping.
    - from:
        - namespaceSelector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values:
                  - knative-serving
                  - kourier-system
                  - kube-system
                  - monitoring
