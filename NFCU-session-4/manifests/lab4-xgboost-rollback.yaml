# Lab 4 (step 3 of 3) — ROLLBACK. canaryTrafficPercent: 0 sends 0% to the new revision,
# i.e. 100% back to the previous good revision (v1.0.0). No pods restart — Knative just
# shifts the traffic split. This is the "undo" you reach for when the canary looks wrong.
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: adult-income-classifier
  labels:
    nfcu-session-4/lab: "4"
spec:
  predictor:
    minReplicas: 0
    maxReplicas: 5
    containerConcurrency: 50
    canaryTrafficPercent: 0    # 0% to v1.0.1 -> all traffic returns to v1.0.0
    serviceAccountName: kserve-sa
    model:
      modelFormat:
        name: xgboost
      storageUri: "s3://REPLACE_WITH_BUCKET/model-v1.0.1"
      resources:
        requests:
          cpu: "250m"
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 1Gi
