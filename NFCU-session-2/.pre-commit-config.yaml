# ABOUTME: Pre-commit hooks for the workshop monorepo, scoped to runnable code only.
# ABOUTME: Top-level exclude keeps every hook off the collateral-only Agentic_DevOps/ tree.
exclude: '^Agentic_DevOps/'

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.2
    hooks:
      - id: mypy
        additional_dependencies: [types-PyYAML, "boto3-stubs[essential]"]
        files: '^MLOps_Deployment_Workshop/.*/(lambdas|models|tests)/.*\.py$'

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.99.0
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
      - id: terraform_tflint

  - repo: https://github.com/aquasecurity/tfsec
    rev: v1.28.14
    hooks:
      - id: tfsec
        args: ['--exclude-path', 'Agentic_DevOps']

  - repo: https://github.com/bridgecrewio/checkov
    rev: 3.2.529
    hooks:
      - id: checkov
        args: ['--quiet', '--skip-path', 'Agentic_DevOps']
